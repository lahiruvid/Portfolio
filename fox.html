<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fox character (standalone)</title>
    <style>
      :root {
        --bg: #14303a;
        --ground: #0d1b22;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: transparent;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        overflow: hidden;
      }

      .stage {
        position: relative;
        width: min(1100px, 96vw);
        height: min(620px, 88vh);
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        overflow: hidden;
      }

      .ground { display: none; }

      /* Fox (running style, with subtle 3D shading) */
      .fox {
        /* darker, less saturated — matches night forest */
        --fox-orange: #8f3f36;
        --fox-orange-dark: #6f2f2a;
        --fox-cream: #c9b0a2;
        --fox-cream-2: #a89288;
        --fox-brown: #24181c;
        --fox-brown-2: #151012;
        --fox-black: #0d0f12;
        --fox-gray: #2b3338;

        position: absolute;
        left: 50%;
        bottom: 18%;
        width: 160px;
        height: 110px;
        transform: translate3d(-50%, 0, 0) scale(0.24);
        transform-origin: 50% 100%;
        filter: brightness(0.78) saturate(0.82) contrast(0.96) drop-shadow(0 8px 12px rgba(0, 0, 0, 0.35));
        will-change: transform, left, bottom;
      }

      .fox.front { z-index: 2; }

      .fox .rig {
        position: absolute;
        inset: 0;
        transform-origin: 50% 100%;
        animation: fox-bob 0.5s ease-in-out infinite;
      }

      @keyframes fox-bob {
        0%, 100% { transform: translate3d(0, 0, 0); }
        50% { transform: translate3d(0, -2.5px, 0); }
      }

      .fox .head {
        position: absolute;
        left: 10px;
        top: 34px;
        width: 92px;
        height: 60px;
        /* cream face base */
        background: linear-gradient(180deg, var(--fox-cream) 0%, var(--fox-cream-2) 100%);
        border-radius: 34px 30px 28px 32px;
        clip-path: polygon(
          0% 56%,
          8% 36%,
          22% 22%,
          42% 14%,
          60% 18%,
          78% 26%,
          94% 42%,
          100% 56%,
          92% 72%,
          74% 84%,
          54% 90%,
          36% 90%,
          20% 84%,
          10% 72%
        );
      }

      .fox .head::before {
        content: "";
        position: absolute;
        /* orange cap (top/back) */
        inset: -10px -12px -6px -10px;
        background: linear-gradient(165deg, var(--fox-orange) 0%, var(--fox-orange-dark) 100%);
        clip-path: polygon(
          22% 50%,
          28% 22%,
          46% 8%,
          66% 10%,
          82% 18%,
          92% 34%,
          94% 56%,
          82% 48%,
          66% 42%,
          52% 44%,
          40% 48%,
          30% 58%
        );
      }

      .fox .head::after {
        content: "";
        position: absolute;
        /* cheek/jaw point */
        left: 46px;
        top: 36px;
        width: 56px;
        height: 36px;
        background: linear-gradient(180deg, var(--fox-cream) 0%, var(--fox-cream-2) 100%);
        clip-path: polygon(0 0, 70% 10%, 100% 50%, 72% 86%, 22% 100%, 0 70%);
      }

      .fox .ear {
        position: absolute;
        top: 10px;
        width: 34px;
        height: 44px;
        background: linear-gradient(160deg, #3a2b2f 0%, var(--fox-brown) 65%, #140f12 100%);
        clip-path: polygon(48% 0, 92% 20%, 100% 100%, 0 100%, 8% 18%);
        transform-origin: 50% 100%;
        z-index: 2;
      }
      /* pushed back toward neck/back of head */
      .fox .ear.left { left: 44px; transform: rotate(10deg); }
      .fox .ear.right { display: none; }
      .fox .ear::after {
        content: "";
        position: absolute;
        left: 9px;
        top: 12px;
        width: 18px;
        height: 24px;
        background: linear-gradient(180deg, var(--fox-cream) 0%, rgba(246, 213, 191, 0.55) 100%);
        clip-path: polygon(50% 0, 90% 24%, 100% 100%, 0 100%, 10% 24%);
        opacity: 0.95;
      }

      .fox .cheek { display: none; }

      .fox .neck {
        position: absolute;
        left: 60px;
        top: 78px;
        width: 50px;
        height: 38px;
        background: linear-gradient(180deg, var(--fox-cream) 0%, var(--fox-cream-2) 100%);
        border-radius: 10px 14px 22px 22px;
        clip-path: polygon(10% 0, 92% 0, 100% 48%, 72% 100%, 22% 100%, 0 60%);
      }

      .fox .eye {
        position: absolute;
        top: 54px;
        left: 40px;
        width: 18px;
        height: 12px;
        background: var(--fox-black);
        border-radius: 999px;
        transform: rotate(-8deg);
      }
      .fox .eye::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 3px;
        width: 4px;
        height: 4px;
        background: rgba(255, 255, 255, 0.75);
        border-radius: 50%;
        opacity: 0.5;
      }
      .fox .eye.right { display: none; }

      .fox .nose {
        position: absolute;
        left: 2px;
        top: 62px;
        width: 10px;
        height: 8px;
        background: #2b2d2f;
        border-radius: 50%;
      }
      .fox .nose::after { display: none; }

      .fox .body {
        position: absolute;
        left: 78px;
        top: 78px;
        width: 150px;
        height: 58px;
        background: linear-gradient(180deg, var(--fox-orange) 0%, var(--fox-orange-dark) 100%);
        border-radius: 42px 62px 54px 44px;
        transform: rotate(-3deg);
      }

      /* hip/torso overlap to visually "connect" legs */
      .fox .body::after {
        content: "";
        position: absolute;
        left: 14px;
        bottom: -6px;
        width: 112px;
        height: 18px;
        background: linear-gradient(180deg, var(--fox-orange) 0%, var(--fox-orange-dark) 100%);
        border-radius: 999px;
        opacity: 0.98;
      }

      .fox .belly {
        position: absolute;
        left: 98px;
        top: 102px;
        width: 92px;
        height: 34px;
        background: linear-gradient(180deg, var(--fox-cream) 0%, var(--fox-cream-2) 100%);
        border-radius: 999px;
        clip-path: polygon(14% 0, 86% 0, 100% 60%, 86% 100%, 18% 100%, 0 55%);
      }

      .fox .tail {
        position: absolute;
        left: 170px;
        top: 6px;
        width: 150px;
        height: 128px;
        background: linear-gradient(180deg, var(--fox-orange) 0%, var(--fox-orange-dark) 100%);
        border-radius: 999px;
        transform-origin: 20% 80%;
        animation: tail-swish 0.72s cubic-bezier(.35,.02,.2,1) infinite;
      }

      .fox .tail::before {
        /* darker shadow at tail base */
        content: "";
        position: absolute;
        left: 0px;
        top: 74px;
        width: 78px;
        height: 62px;
        background: rgba(120, 45, 42, 0.55);
        border-radius: 999px;
      }

      .fox .tail::after {
        content: "";
        position: absolute;
        /* cream tip with jagged edge */
        left: 40px;
        top: -14px;
        width: 132px;
        height: 102px;
        background: linear-gradient(180deg, var(--fox-cream) 0%, var(--fox-cream-2) 100%);
        border-radius: 999px;
        clip-path: polygon(
          0 40%,
          10% 32%,
          18% 38%,
          28% 30%,
          40% 38%,
          52% 30%,
          64% 38%,
          76% 28%,
          88% 36%,
          100% 28%,
          100% 100%,
          0 100%
        );
      }

      @keyframes tail-swish {
        0%, 100% { transform: rotate(10deg); }
        50% { transform: rotate(-7deg); }
      }

      .fox .leg {
        position: absolute;
        top: 134px;
        width: 22px;
        height: 64px;
        background: linear-gradient(180deg, #3a2b2f 0%, var(--fox-brown-2) 100%);
        border-radius: 14px 14px 16px 16px;
        transform-origin: 50% 0%;
        will-change: transform;
      }

      /* lower leg (knee bend) */
      .fox .leg::before {
        content: "";
        position: absolute;
        left: 4px;
        top: 32px;
        width: 14px;
        height: 30px;
        background: linear-gradient(180deg, #3a2b2f 0%, var(--fox-brown-2) 100%);
        border-radius: 12px 12px 14px 14px;
        /* stronger taper: ankle narrower than knee */
        clip-path: polygon(12% 0, 88% 0, 100% 68%, 64% 100%, 36% 100%, 0 68%);
        transform-origin: 50% 0%;
        will-change: transform;
      }

      .fox .leg::after {
        content: "";
        /* paw */
        position: absolute;
        left: -2px;
        bottom: -4px;
        width: 22px;
        height: 14px;
        background: linear-gradient(180deg, #2c1f22 0%, #140f12 100%);
        border-radius: 999px;
        opacity: 0.95;
        clip-path: polygon(6% 35%, 94% 35%, 100% 70%, 86% 100%, 14% 100%, 0 70%);
      }

      .fox .leg.back { opacity: 0.7; filter: saturate(0.9) brightness(0.95); }

      /* front legs */
      .fox .leg.l1 { left: 100px; animation: fox-front-a 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
      .fox .leg.l2 { left: 132px; animation: fox-front-b 0.76s cubic-bezier(.35,.02,.2,1) infinite; }

      /* rear legs (stronger push-off) */
      .fox .leg.l3 { left: 172px; animation: fox-rear-a 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
      .fox .leg.l4 { left: 204px; animation: fox-rear-b 0.76s cubic-bezier(.35,.02,.2,1) infinite; }

      /* lower-leg bend animations (synced) */
      .fox .leg.l1::before { animation: fox-front-a-lower 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
      .fox .leg.l2::before { animation: fox-front-b-lower 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
      .fox .leg.l3::before { animation: fox-rear-a-lower 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
      .fox .leg.l4::before { animation: fox-rear-b-lower 0.76s cubic-bezier(.35,.02,.2,1) infinite; }

      /* More realistic gait: contact -> push -> flight -> reach */
      @keyframes fox-front-a {
        0%   { transform: rotate(22deg) translate3d(1px, -2px, 0) scaleY(0.98); }
        14%  { transform: rotate(8deg) translate3d(0px, 0px, 0) scaleY(1); }
        34%  { transform: rotate(-8deg) translate3d(-1px, 1px, 0) scaleY(1.02); }
        52%  { transform: rotate(-22deg) translate3d(-2px, -2px, 0) scaleY(1); }
        74%  { transform: rotate(16deg) translate3d(2px, -6px, 0) scaleY(0.98); }
        100% { transform: rotate(22deg) translate3d(1px, -2px, 0) scaleY(0.98); }
      }
      @keyframes fox-front-b {
        0%   { transform: rotate(-22deg) translate3d(-2px, -2px, 0) scaleY(1); }
        22%  { transform: rotate(16deg) translate3d(2px, -6px, 0) scaleY(0.98); }
        48%  { transform: rotate(22deg) translate3d(1px, -2px, 0) scaleY(0.98); }
        62%  { transform: rotate(8deg) translate3d(0px, 0px, 0) scaleY(1); }
        82%  { transform: rotate(-8deg) translate3d(-1px, 1px, 0) scaleY(1.02); }
        100% { transform: rotate(-22deg) translate3d(-2px, -2px, 0) scaleY(1); }
      }
      @keyframes fox-rear-a {
        0%   { transform: rotate(18deg) translate3d(1px, -1px, 0) scaleY(0.98); }
        16%  { transform: rotate(2deg) translate3d(0px, 1px, 0) scaleY(1.04); }
        40%  { transform: rotate(-22deg) translate3d(-2px, 2px, 0) scaleY(1.02); }
        54%  { transform: rotate(-34deg) translate3d(-3px, -2px, 0) scaleY(1); }
        78%  { transform: rotate(10deg) translate3d(3px, -7px, 0) scaleY(0.98); }
        100% { transform: rotate(18deg) translate3d(1px, -1px, 0) scaleY(0.98); }
      }
      @keyframes fox-rear-b {
        0%   { transform: rotate(-34deg) translate3d(-3px, -2px, 0) scaleY(1); }
        24%  { transform: rotate(10deg) translate3d(3px, -7px, 0) scaleY(0.98); }
        50%  { transform: rotate(18deg) translate3d(1px, -1px, 0) scaleY(0.98); }
        66%  { transform: rotate(2deg) translate3d(0px, 1px, 0) scaleY(1.04); }
        88%  { transform: rotate(-22deg) translate3d(-2px, 2px, 0) scaleY(1.02); }
        100% { transform: rotate(-34deg) translate3d(-3px, -2px, 0) scaleY(1); }
      }

      /* Lower leg bend (knee flex). More bend during flight/recovery. */
      @keyframes fox-front-a-lower {
        0%   { transform: rotate(-16deg); }
        14%  { transform: rotate(8deg); }
        34%  { transform: rotate(24deg); }
        52%  { transform: rotate(10deg); }
        74%  { transform: rotate(54deg); }
        100% { transform: rotate(-16deg); }
      }
      @keyframes fox-front-b-lower {
        0%   { transform: rotate(10deg); }
        22%  { transform: rotate(54deg); }
        48%  { transform: rotate(-16deg); }
        62%  { transform: rotate(8deg); }
        82%  { transform: rotate(24deg); }
        100% { transform: rotate(10deg); }
      }
      @keyframes fox-rear-a-lower {
        0%   { transform: rotate(-14deg); }
        16%  { transform: rotate(8deg); }
        40%  { transform: rotate(18deg); }
        54%  { transform: rotate(4deg); }
        78%  { transform: rotate(42deg); }
        100% { transform: rotate(-14deg); }
      }
      @keyframes fox-rear-b-lower {
        0%   { transform: rotate(4deg); }
        24%  { transform: rotate(42deg); }
        50%  { transform: rotate(-14deg); }
        66%  { transform: rotate(8deg); }
        88%  { transform: rotate(18deg); }
        100% { transform: rotate(4deg); }
      }

      .fox .speedlines {
        display: none;
      }
      .fox .speedlines span {
        position: absolute;
        left: 0;
        height: 3px;
        background: rgba(15, 20, 22, 0.85);
        border-radius: 999px;
        transform-origin: 100% 50%;
        animation: speedline 0.48s ease-in-out infinite;
      }
      .fox .speedlines span:nth-child(1) { top: 2px; width: 34px; }
      .fox .speedlines span:nth-child(2) { top: 11px; width: 46px; animation-delay: 0.12s; opacity: 0.85; }
      .fox .speedlines span:nth-child(3) { top: 20px; width: 28px; animation-delay: 0.22s; opacity: 0.7; }

      @keyframes speedline {
        0%, 100% { transform: translateX(0); opacity: 0.35; }
        50% { transform: translateX(-10px); opacity: 1; }
      }

      .ui { display: none; }
    </style>
  </head>
  <body>
    <div class="stage" id="scene">
      <div class="fox" id="fox" aria-hidden="true">
        <div class="rig">
          <div class="head"></div>
          <div class="ear left"></div>
          <div class="ear right"></div>
          <div class="cheek left"></div>
          <div class="cheek right"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="nose"></div>
          <div class="neck"></div>
          <div class="speedlines" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
          <div class="body"></div>
          <div class="belly"></div>
          <div class="tail"></div>
          <div class="leg l1 back"></div>
          <div class="leg l2"></div>
          <div class="leg l3 back"></div>
          <div class="leg l4"></div>
        </div>
      </div>

    </div>

    <script>
      const scene = document.getElementById("scene");
      const fox = document.getElementById("fox");

      if (fox) {
        const prefersReducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;

        // Main loop path (in % of stage)
        const cx = 50;          // center X
        const baseBottom = 18;  // center bottom
        const rx = 28;          // horizontal radius
        const ry = 10;          // vertical radius (bigger => less flat)

        // Speed (smaller => slower)
        const speed = prefersReducedMotion ? 0.000035 : 0.00007; // radians/ms

        // Small circular loops along the path
        const loopR = 4.6;
        const loopY = 3.0;
        const loopFreq = 3.6;

        const baseScale = 0.22;
        let lastX = null;

        function animateFox(now) {
          const t = now * speed;
          const loops = t * loopFreq;

          const wobbleX = Math.sin(t * 0.7) * 1.2;
          const wobbleY = Math.cos(t * 0.9) * 0.6;

          const x = cx + Math.cos(t) * rx + Math.cos(loops) * loopR + wobbleX;
          const y = baseBottom + Math.sin(t) * ry + Math.sin(loops) * loopY + wobbleY;

          fox.style.left = `${x}%`;
          fox.style.bottom = `${y}%`;

          // Facing: default art faces LEFT. Flip when moving right.
          const dx = lastX == null ? 0 : x - lastX;
          lastX = x;
          const facing = dx >= 0 ? -1 : 1;

          // scale a bit when "closer" (lower y)
          const depth = (y - (baseBottom - ry)) / (ry * 2); // 0..1
          const scale = baseScale * (0.94 + (1 - depth) * 0.22);

          const tilt = Math.max(-10, Math.min(10, Math.cos(t) * 7));
          fox.style.transform = `translate3d(-50%, 0, 0) scaleX(${facing}) scale(${scale}) rotate(${tilt}deg)`;

          window.requestAnimationFrame(animateFox);
        }

        window.requestAnimationFrame(animateFox);
      }
    </script>
  </body>
</html>
