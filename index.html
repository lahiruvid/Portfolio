<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relaxing Forest Depth Scene</title>
  <style>
    :root {
      --sky-top: #351728;
      --sky-mid: #9b463c;
      --sky-low: #e08d62;
      --ground-fade: #25141d;
      --moon: #f1be82;
      --mist: rgba(255, 215, 170, 0.1);
      --near-tree: #09111a;
      --mid-tree: #152634;
      --far-tree: #314a57;
      --fire-1: #ffd057;
      --fire-2: #ff7f2a;
      --fire-3: #ff4a1d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0e14;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-mid) 42%, var(--sky-low) 72%, #442732 100%);
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 18%, rgba(13, 18, 26, 0.4) 0%, rgba(7, 10, 15, 0.72) 72%);
      opacity: 0;
      z-index: 29;
      pointer-events: none;
      transition: opacity 6.5s ease;
    }

    .scene.moon-covered::after {
      opacity: 0.48;
    }

    .star-portal {
      position: fixed;
      inset: 0;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      background: #06080f;
      transition: opacity 0.55s ease, visibility 0.55s step-end;
    }

    .star-portal.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.55s ease;
    }

    .star-portal iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #06080f;
    }

    .star-portal .portal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 3;
      border: 0;
      border-radius: 999px;
      padding: 9px 14px;
      color: #f8e5d4;
      background: rgba(10, 14, 22, 0.72);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 0 1px rgba(255, 210, 170, 0.28);
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 0.2px;
    }

    .star-portal .portal-close:hover {
      background: rgba(18, 24, 35, 0.88);
    }

    .parallax {
      transform: translate3d(calc(var(--mx, 0) * 1px), calc(var(--my, 0) * 1px), 0);
      transition: transform 0.24s ease-out;
    }

    .moon {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      left: 50%;
      top: 10%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 50% 45%, #ffd7a3 0 34%, #f2b67f 35% 68%, transparent 69%),
        radial-gradient(circle at 50% 50%, rgba(255, 218, 169, 0.85) 0%, rgba(255, 191, 131, 0.18) 62%, transparent 100%);
      filter: drop-shadow(0 0 24px rgba(255, 201, 138, 0.42));
      transition: opacity 6.8s ease, filter 6.8s ease, transform 6.8s ease;
    }

    .scene.moon-covered .moon {
      opacity: 0.2;
      transform: translateX(-50%) scale(0.93);
      filter: drop-shadow(0 0 10px rgba(255, 190, 135, 0.18));
    }

    .clouds {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }

    .clouds::before,
    .clouds::after {
      content: "";
      position: absolute;
      width: 62%;
      height: 80px;
      left: 19%;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(153, 80, 77, 0.88) 0%, rgba(117, 55, 62, 0.18) 72%, transparent 100%);
      filter: blur(1px);
    }

    .clouds::before {
      top: 18%;
      animation: drift 22s linear infinite alternate;
    }

    .clouds::after {
      top: 30%;
      width: 70%;
      left: 15%;
      opacity: 0.7;
      animation: drift 30s linear infinite alternate-reverse;
    }

    .moon-cover-clouds {
      position: absolute;
      left: 50%;
      top: 7.5%;
      width: 460px;
      height: 175px;
      transform: translateX(-50%) translateY(-10px) scale(0.95);
      z-index: 11;
      opacity: 0;
      pointer-events: none;
      transition: opacity 4.8s ease, transform 10s ease;
    }

    .scene.moon-covered .moon-cover-clouds {
      opacity: 1;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .moon-cover-clouds span {
      position: absolute;
      border-radius: 999px;
      background: radial-gradient(ellipse at center, rgba(96, 72, 80, 0.88) 0%, rgba(73, 52, 66, 0.48) 52%, rgba(48, 35, 47, 0.05) 100%);
      filter: blur(0.8px);
      animation: moon-cloud-drift 20s ease-in-out infinite alternate;
    }

    .moon-cover-clouds .c1 {
      width: 280px;
      height: 84px;
      left: -5px;
      top: 24px;
      animation-duration: 18s;
    }

    .moon-cover-clouds .c2 {
      width: 330px;
      height: 96px;
      left: 98px;
      top: 38px;
      opacity: 0.92;
      animation-duration: 22s;
      animation-delay: -4s;
    }

    .moon-cover-clouds .c3 {
      width: 236px;
      height: 74px;
      left: 160px;
      top: 8px;
      opacity: 0.82;
      animation-duration: 17s;
      animation-delay: -2s;
    }

    .moon-cover-clouds .c4 {
      width: 200px;
      height: 64px;
      left: 58px;
      top: 82px;
      opacity: 0.75;
      animation-duration: 19s;
      animation-delay: -6s;
    }

    .stars span {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 250, 233, 0.85);
      box-shadow: 0 0 7px rgba(255, 238, 180, 0.55);
      animation: twinkle 3.5s ease-in-out infinite;
      opacity: 0.45;
    }


    .mist {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 52%, rgba(255, 183, 129, 0.28) 0 15%, rgba(255, 189, 149, 0.06) 34%, transparent 60%),
        linear-gradient(to top, rgba(255, 170, 120, 0.16), transparent 50%);
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .mountains {
      position: absolute;
      inset: auto 0 33% 0;
      height: 38%;
      z-index: 2;
      pointer-events: none;
    }

    .mountain {
      position: absolute;
      bottom: 0;
      width: var(--w, 440px);
      height: var(--h, 260px);
      background: linear-gradient(
        to bottom,
        rgba(92, 118, 131, 0.95) 0%,
        rgba(70, 94, 107, 0.94) 40%,
        rgba(52, 73, 84, 0.95) 100%
      );
      clip-path: var(--clip, polygon(0% 100%, 9% 88%, 17% 81%, 27% 70%, 35% 58%, 41% 45%, 48% 33%, 55% 18%, 60% 24%, 66% 37%, 74% 52%, 82% 66%, 90% 80%, 100% 100%));
      border-radius: 8px 8px 0 0;
      filter: saturate(0.85);
      opacity: 0.9;
      overflow: hidden;
    }

    .mountain::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        rgba(248, 248, 245, 0.95) 0 16%,
        rgba(235, 239, 241, 0.7) 16% 29%,
        rgba(255, 255, 255, 0) 30% 100%
      );
      clip-path: var(--snow, polygon(44% 35%, 52% 24%, 60% 36%, 65% 48%, 57% 44%, 50% 38%));
      opacity: 0.9;
    }

    .mountain::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 45%, rgba(26, 33, 40, 0.35) 100%);
      clip-path: polygon(
        0% 100%,
        12% 86%,
        24% 76%,
        37% 63%,
        47% 50%,
        57% 38%,
        67% 45%,
        81% 66%,
        100% 100%
      );
    }

    .mountains-back {
      position: absolute;
      inset: auto 0 38% 0;
      height: 28%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.65;
      filter: blur(0.5px);
    }

    .layer {
      position: absolute;
      inset: auto 0 0 0;
      height: 100%;
      pointer-events: none;
    }

    .forest-far {
      z-index: 20;
      filter: saturate(0.8);
    }

    .forest-mid {
      z-index: 22;
    }

    .forest-near {
      z-index: 24;
    }

    .forest-edge {
      z-index: 21;
      opacity: 0.85;
      filter: brightness(0.8);
    }

    .tree {
      position: absolute;
      bottom: 18%;
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 64px solid currentColor;
      color: var(--far-tree);
      transform: scale(var(--s, 1));
    }

    .tree::before,
    .tree::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 16px solid transparent;
      border-right: 16px solid transparent;
      border-bottom: 46px solid currentColor;
    }

    .tree::before {
      bottom: -14px;
    }

    .tree::after {
      bottom: 17px;
    }

    .forest-mid .tree {
      color: var(--mid-tree);
      border-left-width: 30px;
      border-right-width: 30px;
      border-bottom-width: 88px;
      bottom: 12%;
    }

    .forest-mid .tree::before,
    .forest-mid .tree::after {
      border-left-width: 21px;
      border-right-width: 21px;
      border-bottom-width: 62px;
    }

    .forest-near .tree {
      color: var(--near-tree);
      border-left-width: 36px;
      border-right-width: 36px;
      border-bottom-width: 108px;
      bottom: 6%;
    }

    .forest-near .tree::before,
    .forest-near .tree::after {
      border-left-width: 28px;
      border-right-width: 28px;
      border-bottom-width: 78px;
    }

    .forest-edge .tree {
      color: #10212d;
      border-left-width: 25px;
      border-right-width: 25px;
      border-bottom-width: 78px;
      bottom: 11%;
    }

    .forest-edge .tree::before,
    .forest-edge .tree::after {
      border-left-width: 18px;
      border-right-width: 18px;
      border-bottom-width: 56px;
    }

    .tree.fir {
      filter: brightness(0.92);
    }

    .tree.fir::before {
      bottom: -26px;
      border-left-width: 16px;
      border-right-width: 16px;
      border-bottom-width: 54px;
    }

    .tree.fir::after {
      bottom: 16px;
      border-left-width: 24px;
      border-right-width: 24px;
      border-bottom-width: 68px;
    }

    .tree.pine {
      filter: brightness(1.06);
    }

    .tree.pine::before {
      bottom: -12px;
      border-left-width: 24px;
      border-right-width: 24px;
      border-bottom-width: 66px;
    }

    .tree.pine::after {
      bottom: 28px;
      border-left-width: 16px;
      border-right-width: 16px;
      border-bottom-width: 50px;
    }

    .tree.spruce {
      filter: brightness(0.97);
    }

    .tree.spruce::before {
      bottom: -20px;
      border-left-width: 12px;
      border-right-width: 12px;
      border-bottom-width: 38px;
    }

    .tree.spruce::after {
      bottom: 12px;
      border-left-width: 20px;
      border-right-width: 20px;
      border-bottom-width: 60px;
    }

    .tree.cedar {
      filter: brightness(1.03);
    }

    .tree.cedar::before {
      bottom: -10px;
      border-left-width: 24px;
      border-right-width: 24px;
      border-bottom-width: 54px;
    }

    .tree.cedar::after {
      bottom: 30px;
      border-left-width: 11px;
      border-right-width: 11px;
      border-bottom-width: 34px;
    }

    /* Wind + environment */
    .wind {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.9;
      mix-blend-mode: screen;
    }

    .gust {
      position: absolute;
      width: 160px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(to left, rgba(255, 245, 224, 0), rgba(255, 220, 190, 0.26), rgba(255, 245, 224, 0));
      filter: blur(0.2px);
      transform: rotate(-10deg);
      opacity: 0;
      animation: gust var(--gd, 1.8s) ease-out forwards;
    }

    @keyframes gust {
      0% { opacity: 0; transform: translate3d(0, 0, 0) rotate(-10deg); }
      12% { opacity: 0.9; }
      100% { opacity: 0; transform: translate3d(-520px, 120px, 0) rotate(-10deg); }
    }

    .tree {
      transform-origin: 50% 100%;
    }

    .windy .forest-far .tree { animation: sway-far 1.7s ease-in-out 2; }
    .windy .forest-edge .tree { animation: sway-edge 1.5s ease-in-out 2; }
    .windy .forest-mid .tree { animation: sway-mid 1.35s ease-in-out 2; }
    .windy .forest-near .tree { animation: sway-near 1.2s ease-in-out 2; }

    @keyframes sway-far {
      0%, 100% { transform: translateZ(0) rotate(0deg) scale(var(--s, 1)); }
      50% { transform: translateZ(0) rotate(1.2deg) scale(var(--s, 1)); }
    }
    @keyframes sway-edge {
      0%, 100% { transform: translateZ(0) rotate(0deg) scale(var(--s, 1)); }
      50% { transform: translateZ(0) rotate(1.8deg) scale(var(--s, 1)); }
    }
    @keyframes sway-mid {
      0%, 100% { transform: translateZ(0) rotate(0deg) scale(var(--s, 1)); }
      50% { transform: translateZ(0) rotate(2.2deg) scale(var(--s, 1)); }
    }
    @keyframes sway-near {
      0%, 100% { transform: translateZ(0) rotate(0deg) scale(var(--s, 1)); }
      50% { transform: translateZ(0) rotate(2.8deg) scale(var(--s, 1)); }
    }

    /* Dead trees */
    .dead-tree {
      position: absolute;
      bottom: 9%;
      width: 18px;
      height: 120px;
      background: linear-gradient(to bottom, rgba(10, 16, 22, 0.95), rgba(12, 17, 25, 0.75));
      border-radius: 10px;
      z-index: 6;
      filter: saturate(0.85);
    }
    .dead-tree::before,
    .dead-tree::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 32px;
      width: 64px;
      height: 10px;
      transform: translateX(-50%) rotate(var(--r, -20deg));
      border-radius: 999px;
      background: linear-gradient(to right, rgba(10, 16, 22, 0), rgba(10, 16, 22, 0.9), rgba(10, 16, 22, 0));
      opacity: 0.85;
    }
    .dead-tree::after {
      top: 58px;
      width: 52px;
      transform: translateX(-50%) rotate(calc(var(--r, -20deg) * -1));
      opacity: 0.7;
    }

    /* Animals */
    .animals {
      position: absolute;
      inset: 0;
      z-index: 18;
      pointer-events: none;
    }

    .birds {
      position: absolute;
      left: 0;
      top: 16%;
      width: 100%;
      height: 26%;
      opacity: 0.7;
      filter: blur(0.1px);
    }

    .bird {
      position: absolute;
      width: 14px;
      height: 8px;
      border: 2px solid rgba(255, 220, 190, 0.55);
      border-color: rgba(255, 220, 190, 0.55) transparent transparent transparent;
      border-radius: 50% 50% 0 0;
      transform: rotate(-10deg);
      animation: bird-fly var(--bd, 18s) linear infinite;
      opacity: 0.0;
    }

    @keyframes bird-fly {
      0% { opacity: 0; transform: translate3d(105vw, 0, 0) rotate(-10deg) scale(0.9); }
      6% { opacity: 0.85; }
      100% { opacity: 0; transform: translate3d(-20vw, 70px, 0) rotate(-6deg) scale(1.05); }
    }

    .bunny {
      position: absolute;
      left: 18%;
      bottom: 16%;
      width: 26px;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(to bottom, #2a1d22, #0f0d11);
      filter: drop-shadow(0 10px 12px rgba(0, 0, 0, 0.35));
      opacity: 0.8;
      animation: bunny-hop 4.8s ease-in-out infinite;
    }

    .bunny::before,
    .bunny::after {
      content: "";
      position: absolute;
      top: -10px;
      width: 7px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(to bottom, #2f2127, #151015);
      transform-origin: 50% 100%;
    }

    .bunny::before { left: 6px; transform: rotate(-6deg); }
    .bunny::after { left: 13px; transform: rotate(10deg); }

    @keyframes bunny-hop {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      20% { transform: translate3d(40px, -10px, 0) scale(0.95); }
      40% { transform: translate3d(88px, 0px, 0) scale(1); }
      60% { transform: translate3d(126px, -9px, 0) scale(0.96); }
      80% { transform: translate3d(170px, 0px, 0) scale(1); }
    }

    /* Fox (running style like reference, with subtle 3D shading) */
    .fox {
      /* darker, less saturated — matches night forest */
      --fox-orange: #8f3f36;
      --fox-orange-dark: #6f2f2a;
      --fox-cream: #c9b0a2;
      --fox-cream-2: #a89288;
      --fox-brown: #24181c;
      --fox-brown-2: #151012;
      --fox-black: #0d0f12;
      --fox-gray: #2b3338;

      position: absolute;
      left: 50%;
      bottom: 15.2%;
      width: 160px;
      height: 110px;
      z-index: 16; /* below forest tree layers (far/edge/mid/near) */
      transform: translate3d(0, 0, 0) scale(0.22);
      transform-origin: 50% 100%;
      filter: brightness(0.78) saturate(0.82) contrast(0.96) drop-shadow(0 8px 12px rgba(0, 0, 0, 0.35));
      opacity: 1;
      will-change: transform, left, bottom;
    }

    .fox .rig {
      position: absolute;
      inset: 0;
      transform-origin: 50% 100%;
      animation: fox-bob 0.5s ease-in-out infinite;
    }

    @keyframes fox-bob {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(0, -2.5px, 0); }
    }

    .fox .head {
      position: absolute;
      left: 10px;
      top: 34px;
      width: 92px;
      height: 60px;
      background: linear-gradient(180deg, var(--fox-cream) 0%, var(--fox-cream-2) 100%);
      border-radius: 34px 30px 28px 32px;
      clip-path: polygon(
        0% 56%,
        8% 36%,
        22% 22%,
        42% 14%,
        60% 18%,
        78% 26%,
        94% 42%,
        100% 56%,
        92% 72%,
        74% 84%,
        54% 90%,
        36% 90%,
        20% 84%,
        10% 72%
      );
    }

    .fox .head::before {
      content: "";
      position: absolute;
      inset: -10px -12px -6px -10px;
      background: linear-gradient(165deg, var(--fox-orange) 0%, var(--fox-orange-dark) 100%);
      clip-path: polygon(
        22% 50%,
        28% 22%,
        46% 8%,
        66% 10%,
        82% 18%,
        92% 34%,
        94% 56%,
        82% 48%,
        66% 42%,
        52% 44%,
        40% 48%,
        30% 58%
      );
    }

    .fox .head::after {
      content: "";
      position: absolute;
      left: 46px;
      top: 36px;
      width: 56px;
      height: 36px;
      background: linear-gradient(180deg, var(--fox-cream) 0%, var(--fox-cream-2) 100%);
      clip-path: polygon(0 0, 70% 10%, 100% 50%, 72% 86%, 22% 100%, 0 70%);
    }

    .fox .ear {
      position: absolute;
      top: 10px;
      width: 34px;
      height: 44px;
      background: linear-gradient(160deg, #3a2b2f 0%, var(--fox-brown) 65%, #140f12 100%);
      clip-path: polygon(48% 0, 92% 20%, 100% 100%, 0 100%, 8% 18%);
      transform-origin: 50% 100%;
      z-index: 2;
    }
    /* pushed back toward neck/back of head */
    .fox .ear.left { left: 44px; transform: rotate(10deg); }
    .fox .ear.right { display: none; }
    .fox .ear::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 12px;
      width: 18px;
      height: 24px;
      background: linear-gradient(180deg, var(--fox-cream) 0%, rgba(246, 213, 191, 0.55) 100%);
      clip-path: polygon(50% 0, 90% 24%, 100% 100%, 0 100%, 10% 24%);
      opacity: 0.95;
    }

    .fox .cheek { display: none; }

    .fox .neck {
      position: absolute;
      left: 60px;
      top: 78px;
      width: 50px;
      height: 38px;
      background: linear-gradient(180deg, var(--fox-cream) 0%, var(--fox-cream-2) 100%);
      border-radius: 10px 14px 22px 22px;
      clip-path: polygon(10% 0, 92% 0, 100% 48%, 72% 100%, 22% 100%, 0 60%);
    }

    .fox .eye {
      position: absolute;
      top: 54px;
      left: 40px;
      width: 18px;
      height: 12px;
      background: var(--fox-black);
      border-radius: 999px;
      transform: rotate(-8deg);
    }
    .fox .eye::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 3px;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.75);
      border-radius: 50%;
      opacity: 0.5;
    }
    .fox .eye.right { display: none; }

    .fox .nose {
      position: absolute;
      left: 2px;
      top: 62px;
      width: 10px;
      height: 8px;
      background: #2b2d2f;
      border-radius: 50%;
    }
    .fox .nose::after { display: none; }

    .fox .body {
      position: absolute;
      left: 78px;
      top: 78px;
      width: 150px;
      height: 58px;
      background: linear-gradient(180deg, var(--fox-orange) 0%, var(--fox-orange-dark) 100%);
      border-radius: 42px 62px 54px 44px;
      transform: rotate(-3deg);
    }

    .fox .body::after {
      content: "";
      position: absolute;
      left: 14px;
      bottom: -6px;
      width: 112px;
      height: 18px;
      background: linear-gradient(180deg, var(--fox-orange) 0%, var(--fox-orange-dark) 100%);
      border-radius: 999px;
      opacity: 0.98;
    }

      transform-origin: 20% 80%;
      animation: tail-swish 0.72s cubic-bezier(.35,.02,.2,1) infinite;

    .fox .tail::before {

      content: "";
      position: absolute;
      left: 0px;
      top: 74px;
      width: 78px;
      height: 62px;
      background: rgba(120, 45, 42, 0.55);

    .fox .tail::after {
      content: "";
      position: absolute;
      /* cream tip with jagged edge */
      left: 40px;
      top: -14px;
      width: 132px;
      height: 102px;
      background: linear-gradient(180deg, var(--fox-cream) 0%, var(--fox-cream-2) 100%);
      border-radius: 999px;
      clip-path: polygon(
        0 40%,
        10% 32%,
        18% 38%,
        28% 30%,
        40% 38%,
        52% 30%,
        64% 38%,
        76% 28%,
        88% 36%,
        100% 28%,
        100% 100%,
        0 100%
      );

    .fox .leg {
      position: absolute;
      top: 110px;
      width: 22px;
      height: 44px;
      background: linear-gradient(to bottom, #3a2b2f 0%, var(--fox-brown-2) 100%);
      border-radius: 14px 14px 16px 16px;
      transform-origin: 50% 0%;
      will-change: transform;
    }

    .fox .leg::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 18px;
      width: 14px;
      height: 28px;
      background: linear-gradient(to bottom, #3a2b2f 0%, var(--fox-brown-2) 100%);
      border-radius: 12px 12px 14px 14px;
      clip-path: polygon(12% 0, 88% 0, 100% 68%, 64% 100%, 36% 100%, 0 68%);
      transform-origin: 50% 0%;
      will-change: transform;
    }

    .fox .leg::after {
      content: "";
      position: absolute;
      left: -2px;
      bottom: -4px;
      width: 22px;
      height: 12px;
      background: linear-gradient(180deg, #2c1f22 0%, #140f12 100%);
      border-radius: 999px;
      opacity: 0.95;
      transform: none;
      clip-path: polygon(6% 35%, 94% 35%, 100% 70%, 86% 100%, 14% 100%, 0 70%);
    }

    .fox .leg::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 22px;
      height: 18px;
      background: linear-gradient(to bottom, var(--fox-gray), var(--fox-black));
      border-radius: 0 0 14px 14px;
    }

    .fox .leg.back { opacity: 0.7; filter: saturate(0.9) brightness(0.95); }

    .fox .leg.l1 { left: 80px; animation: fox-front-a 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
    .fox .leg.l2 { left: 106px; animation: fox-front-b 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
    .fox .leg.l3 { left: 132px; animation: fox-rear-a 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
    .fox .leg.l4 { left: 154px; animation: fox-rear-b 0.76s cubic-bezier(.35,.02,.2,1) infinite; }

    .fox .leg.l1::before { animation: fox-front-a-lower 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
    .fox .leg.l2::before { animation: fox-front-b-lower 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
    .fox .leg.l3::before { animation: fox-rear-a-lower 0.76s cubic-bezier(.35,.02,.2,1) infinite; }
    .fox .leg.l4::before { animation: fox-rear-b-lower 0.76s cubic-bezier(.35,.02,.2,1) infinite; }

    @keyframes fox-front-a {
      0%   { transform: rotate(22deg) translate3d(1px, -2px, 0) scaleY(0.98); }
      14%  { transform: rotate(8deg) translate3d(0px, 0px, 0) scaleY(1); }
      34%  { transform: rotate(-8deg) translate3d(-1px, 1px, 0) scaleY(1.02); }
      52%  { transform: rotate(-22deg) translate3d(-2px, -2px, 0) scaleY(1); }
      74%  { transform: rotate(16deg) translate3d(2px, -6px, 0) scaleY(0.98); }
      100% { transform: rotate(22deg) translate3d(1px, -2px, 0) scaleY(0.98); }
    }
    @keyframes fox-front-b {
      0%   { transform: rotate(-22deg) translate3d(-2px, -2px, 0) scaleY(1); }
      22%  { transform: rotate(16deg) translate3d(2px, -6px, 0) scaleY(0.98); }
      48%  { transform: rotate(22deg) translate3d(1px, -2px, 0) scaleY(0.98); }
      62%  { transform: rotate(8deg) translate3d(0px, 0px, 0) scaleY(1); }
      82%  { transform: rotate(-8deg) translate3d(-1px, 1px, 0) scaleY(1.02); }
      100% { transform: rotate(-22deg) translate3d(-2px, -2px, 0) scaleY(1); }
    }
    @keyframes fox-rear-a {
      0%   { transform: rotate(18deg) translate3d(1px, -1px, 0) scaleY(0.98); }
      16%  { transform: rotate(2deg) translate3d(0px, 1px, 0) scaleY(1.04); }
      40%  { transform: rotate(-22deg) translate3d(-2px, 2px, 0) scaleY(1.02); }
      54%  { transform: rotate(-34deg) translate3d(-3px, -2px, 0) scaleY(1); }
      78%  { transform: rotate(10deg) translate3d(3px, -7px, 0) scaleY(0.98); }
      100% { transform: rotate(18deg) translate3d(1px, -1px, 0) scaleY(0.98); }
    }
    @keyframes fox-rear-b {
      0%   { transform: rotate(-34deg) translate3d(-3px, -2px, 0) scaleY(1); }
      24%  { transform: rotate(10deg) translate3d(3px, -7px, 0) scaleY(0.98); }
      50%  { transform: rotate(18deg) translate3d(1px, -1px, 0) scaleY(0.98); }
      66%  { transform: rotate(2deg) translate3d(0px, 1px, 0) scaleY(1.04); }
      88%  { transform: rotate(-22deg) translate3d(-2px, 2px, 0) scaleY(1.02); }
      100% { transform: rotate(-34deg) translate3d(-3px, -2px, 0) scaleY(1); }
    }

    @keyframes fox-front-a-lower {
      0%   { transform: rotate(-16deg); }
      14%  { transform: rotate(8deg); }
      34%  { transform: rotate(24deg); }
      52%  { transform: rotate(10deg); }
      74%  { transform: rotate(54deg); }
      100% { transform: rotate(-16deg); }
    }
    @keyframes fox-front-b-lower {
      0%   { transform: rotate(10deg); }
      22%  { transform: rotate(54deg); }
      48%  { transform: rotate(-16deg); }
      62%  { transform: rotate(8deg); }
      82%  { transform: rotate(24deg); }
      100% { transform: rotate(10deg); }
    }
    @keyframes fox-rear-a-lower {
      0%   { transform: rotate(-14deg); }
      16%  { transform: rotate(8deg); }
      40%  { transform: rotate(18deg); }
      54%  { transform: rotate(4deg); }
      78%  { transform: rotate(42deg); }
      100% { transform: rotate(-14deg); }
    }
    @keyframes fox-rear-b-lower {
      0%   { transform: rotate(4deg); }
      24%  { transform: rotate(42deg); }
      50%  { transform: rotate(-14deg); }
      66%  { transform: rotate(8deg); }
      88%  { transform: rotate(18deg); }
      100% { transform: rotate(4deg); }
    }

    @keyframes tail-swish {
      /* softer, more organic: sway + slight laggy stretch */
      0% { transform: rotate(18deg) translate3d(0, 0, 0) scaleX(1.02); }
      25% { transform: rotate(8deg) translate3d(0, 1px, 0) scaleX(1); }

        <div class="arm rear" id="armRear">
          <span class="upper"></span>
          <span class="lower"></span>
          <span class="hand"></span>
        </div>
        <div class="arm front" id="armFront">
          <span class="upper"></span>
          <span class="lower"></span>
          <span class="hand"></span>
        </div>
        <div class="leg rear" id="legRear">
          <span class="upper"></span>
          <span class="lower"></span>
          <span class="foot"></span>
        </div>
        <div class="leg front" id="legFront">
          <span class="upper"></span>
          <span class="lower"></span>
          <span class="foot"></span>
        </div>
      </div>
    </div>

    <div class="glow"></div>
    <div class="fire-shadow"></div>
    <div class="fire-light"></div>
    <div class="ground"></div>
    <div class="fireflies" id="fireflies"></div>
    <div class="wind" id="wind"></div>
    <div class="animals">
      <div class="birds" id="birds"></div>
      <div class="bunny"></div>
    </div>

    <div class="camp-setup parallax" style="--mx: -2.2; --my: 0.35">
      <div class="camp-crate"></div>
      <div class="camp-roll"></div>
      <div class="camp-tent"></div>
    </div>

    <div class="fire-base">
      <div class="log"></div>
      <div class="log"></div>
      <div class="log"></div>
      <div class="flames">
        <div class="flame flame-left"></div>
        <div class="flame flame-main"></div>
        <div class="flame flame-right"></div>
        <div class="flame flame-inner"></div>
      </div>
      <div class="ember" style="--delay:0.1s; --ed:1.4s"></div>
      <div class="ember" style="--delay:0.9s; --ed:1.8s"></div>
      <div class="ember" style="--delay:1.5s; --ed:1.6s"></div>
      <div class="ember" style="--delay:2.2s; --ed:1.9s"></div>
      <div class="smoke big" style="animation-delay:0s; --sd:5.6s"></div>
      <div class="smoke" style="animation-delay:0.8s; --sd:5s"></div>
      <div class="smoke small" style="animation-delay:1.5s; --sd:4.5s"></div>
      <div class="smoke big" style="animation-delay:2.1s; --sd:5.8s"></div>
      <div class="smoke" style="animation-delay:2.9s; --sd:5.2s"></div>
      <div class="smoke small" style="animation-delay:3.6s; --sd:4.7s"></div>
      <div class="smoke big" style="animation-delay:4.2s; --sd:6.1s"></div>
      <div class="smoke" style="animation-delay:4.9s; --sd:5.4s"></div>
    </div>

  </div>
  <script>
    const scene = document.getElementById("scene");
    const parallaxLayers = Array.from(document.querySelectorAll(".parallax"));
    const fireflies = document.getElementById("fireflies");
    const shootingStar = document.getElementById("shootingStar");
    const wind = document.getElementById("wind");
    const birds = document.getElementById("birds");
    const fox = document.getElementById("fox");
    const walker = document.getElementById("walker");
    const walkerRig = document.getElementById("walkerRig");
    const armFront = document.getElementById("armFront");
    const armRear = document.getElementById("armRear");
    const legFront = document.getElementById("legFront");
    const legRear = document.getElementById("legRear");

    for (let i = 0; i < 14; i += 1) {
      const dot = document.createElement("span");
      dot.className = "firefly";
      dot.style.left = `${8 + Math.random() * 84}%`;
      dot.style.top = `${20 + Math.random() * 65}%`;
      dot.style.setProperty("--dur", `${4.5 + Math.random() * 4}s`);
      dot.style.setProperty("--pulse", `${1.8 + Math.random() * 2.4}s`);
      dot.style.setProperty("--delay", `${Math.random() * 4}s`);
      fireflies.appendChild(dot);
    }

    // Birds
    for (let i = 0; i < 7; i += 1) {
      const bird = document.createElement("div");
      bird.className = "bird";
      bird.style.top = `${10 + Math.random() * 60}%`;
      bird.style.setProperty("--bd", `${14 + Math.random() * 16}s`);
      bird.style.animationDelay = `${Math.random() * 10}s`;
      bird.style.transform = `rotate(${-6 - Math.random() * 10}deg)`;
      birds.appendChild(bird);
    }

    function spawnGust() {
      if (!wind) return;
      const g = document.createElement("div");
      g.className = "gust";
      g.style.left = `${70 + Math.random() * 30}%`;
      g.style.top = `${18 + Math.random() * 55}%`;
      g.style.setProperty("--gd", `${1.3 + Math.random() * 1.6}s`);
      wind.appendChild(g);
      window.setTimeout(() => g.remove(), 2600);
    }

    function triggerWindBurst() {
      scene.classList.add("windy");
      const gustCount = 6 + Math.floor(Math.random() * 6);
      for (let i = 0; i < gustCount; i += 1) {
        window.setTimeout(spawnGust, i * (120 + Math.random() * 120));
      }
      window.setTimeout(() => scene.classList.remove("windy"), 2600);
    }

    // Occasional wind bursts
    window.setInterval(() => {
      if (Math.random() > 0.55) triggerWindBurst();
    }, 5200);

    // Fox: slow circular/elliptical wandering path + depth (scale reads closer/farther; trees paint above).
    if (fox) {
      const prefersReducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;
      const cx = 48;        // center X in %
      const baseBottom = 15.8; // center bottom in %
      const rx = 24;        // horizontal radius in %
      const ry = 5.6;       // vertical radius in % (bigger = less "straight line")
      const speed = prefersReducedMotion ? 0.00004 : 0.000085; // radians/ms (smaller = slower)
      const baseScale = 0.22;

      // small loops ("circles") along the path
      const loopR = 4.2;     // loop radius in % (x)
      const loopY = 2.0;     // loop radius in % (y) (bigger = actual circles)
      const loopFreq = 3.4;  // loops per revolution
      let lastX = null;
      let obstacles = [];

      function updateObstacles() {
        const sceneRect = scene.getBoundingClientRect();
        if (!sceneRect.width || !sceneRect.height) return;

        // Prefer closer trees so "around the trees" reads clearly.
        const nodes = Array.from(document.querySelectorAll(".forest-near .tree, .forest-edge .tree"));
        obstacles = nodes.map((el) => {
          const r = el.getBoundingClientRect();
          const xPct = ((r.left + r.width / 2 - sceneRect.left) / sceneRect.width) * 100;
          const yPct = ((r.top + r.height - sceneRect.top) / sceneRect.height) * 100;
          const size = Math.max(r.width, r.height);
          return { x: xPct, y: yPct, s: size };
        }).filter((o) => Number.isFinite(o.x) && Number.isFinite(o.y));
      }

      updateObstacles();
      window.addEventListener("resize", updateObstacles);

      function animateFox(now) {
        const t = now * speed;
        const loops = t * loopFreq;
        // Add a gentle extra wander wobble so it feels less "math perfect"
        const wobbleX = Math.sin(t * 0.7) * 1.2;
        const wobbleY = Math.cos(t * 0.9) * 0.6;
        let x = cx + Math.cos(t) * rx + Math.cos(loops) * loopR + wobbleX;
        let y = baseBottom + Math.sin(t) * ry + Math.sin(loops) * loopY + wobbleY;

        // Tree avoidance: push away from nearby trunks (simple repulsion).
        // Keeps the fox weaving around trees without hardcoding waypoints.
        let pushX = 0;
        let pushY = 0;
        for (let i = 0; i < obstacles.length; i += 1) {
          const o = obstacles[i];
          const dx = x - o.x;
          const dy = y - o.y;
          const d2 = dx * dx + dy * dy;
          const r = 6.5; // influence radius in %
          if (d2 > r * r || d2 < 0.001) continue;
          const d = Math.sqrt(d2);
          const strength = (1 - d / r);
          // Stronger horizontal steering, small vertical nudge.
          pushX += (dx / d) * strength * 3.2;
          pushY += (dy / d) * strength * 0.9;
        }
        x += pushX;
        y += pushY;

        // Position
        fox.style.left = `${x}%`;
        fox.style.bottom = `${y}%`;

        // Face direction based on movement (dx sign)
        // Default fox art faces LEFT (head on left, tail on right).
        // When moving right, flip horizontally so it faces direction of travel.
        const dx = lastX == null ? 0 : x - lastX;
        lastX = x;
        const facing = dx >= 0 ? -1 : 1;

        // Depth cue: slightly larger when "closer" (lower y)
        const depth = (y - (baseBottom - ry)) / (ry * 2); // 0..1
        const scale = baseScale * (0.92 + (1 - depth) * 0.22);

        // Add a slight tilt into the curve for nicer motion
        const tilt = Math.max(-10, Math.min(10, Math.cos(t) * 7));
        fox.style.transform = `translate3d(-50%, 0, 0) scaleX(${facing}) scale(${scale}) rotate(${tilt}deg)`;

        window.requestAnimationFrame(animateFox);
      }

      // Start with a safe transform origin at center
      fox.style.transform = "translate3d(-50%, 0, 0) scale(0.22)";
      window.requestAnimationFrame(animateFox);
    }

    if (walker && walkerRig && armFront && armRear && legFront && legRear) {
      const armFrontUpper = armFront.querySelector(".upper");
      const armFrontLower = armFront.querySelector(".lower");
      const armRearUpper = armRear.querySelector(".upper");
      const armRearLower = armRear.querySelector(".lower");
      const legFrontUpper = legFront.querySelector(".upper");
      const legFrontLower = legFront.querySelector(".lower");
      const legRearUpper = legRear.querySelector(".upper");
      const legRearLower = legRear.querySelector(".lower");
      const footFront = legFront.querySelector(".foot");
      const footRear = legRear.querySelector(".foot");
      const handFront = armFront.querySelector(".hand");
      const handRear = armRear.querySelector(".hand");

      const human = {
        x: 50.6,
        y: 16.1,
        facing: 1,
        phase: 0,
        lastTs: 0,
        startTs: 0
      };

      function setLimb(upper, lower, upperDeg, lowerDeg) {
        upper.style.transform = `translateX(-50%) rotate(${upperDeg}deg)`;
        lower.style.transform = `translateX(-50%) rotate(${lowerDeg}deg)`;
      }

      function easeInOut(t) {
        const x = Math.max(0, Math.min(1, t));
        return x * x * (3 - 2 * x);
      }

      function animateWalker(now) {
        if (!human.lastTs) human.lastTs = now;
        if (!human.startTs) human.startTs = now;
        const dt = Math.min(34, now - human.lastTs);
        human.lastTs = now;

        // 20s loop:
        // walk camp->fire (6s) -> wait (5s) -> walk fire->camp (6s) -> wait (3s)
        const loopMs = 20000;
        const tLoop = (now - human.startTs) % loopMs;
        const campX = 50.6;
        const fireX = 44.2;

        let moving = false;
        if (tLoop < 6000) {
          const k = easeInOut(tLoop / 6000);
          human.x = campX + (fireX - campX) * k;
          human.facing = 1;
          moving = true;
        } else if (tLoop < 11000) {
          human.x = fireX;
          human.facing = 1;
        } else if (tLoop < 17000) {
          const k = easeInOut((tLoop - 11000) / 6000);
          human.x = fireX + (campX - fireX) * k;
          human.facing = -1;
          moving = true;
        } else {
          human.x = campX;
          human.facing = -1;
        }

        if (moving) {
          // Slower gait to fit 6s travel segment.
          human.phase += dt * 0.0065;
        } else {
          // Tiny breathing even when standing still.
          human.phase += dt * 0.0019;
        }
        const walk = moving ? Math.sin(human.phase) : 0;
        const walkOpp = moving ? Math.sin(human.phase + Math.PI) : 0;
        const frontBack = Math.max(0, -walk);
        const rearBack = Math.max(0, -walkOpp);

        const breath = Math.sin(human.phase * 2) * 0.45;
        const torsoBob = moving ? Math.sin(human.phase * 2) * 0.7 : breath;
        walker.style.left = `${human.x}%`;
        walker.style.bottom = `${human.y}%`;
        walker.style.setProperty("--facing", `${human.facing}`);
        const isAtFire = tLoop >= 6000 && tLoop < 11000;
        const isAtCamp = tLoop >= 17000;
        let rigTilt = 0;
        let rigY = torsoBob;
        if (isAtFire) {
          rigTilt = 6; // leaning into the fire = personality
          rigY = breath + 0.25;
        } else if (isAtCamp) {
          rigTilt = -3; // relaxed at camp
        }
        walkerRig.style.transform = `translateY(${rigY}px) rotate(${rigTilt}deg)`;

        let frontLegUpperDeg = 6 + walk * 13;
        let rearLegUpperDeg = 6 + walkOpp * 13;
        let frontLegLowerDeg = -1 - frontBack * 24;
        let rearLegLowerDeg = -1 - rearBack * 24;

        if (isAtFire) {
          // Small crouch while warming.
          frontLegUpperDeg = 10;
          rearLegUpperDeg = 10;
          frontLegLowerDeg = -14;
          rearLegLowerDeg = -14;
        } else if (isAtCamp) {
          // Weight shift idle.
          const sway = Math.sin(human.phase * 1.3) * 3;
          frontLegUpperDeg = 8 + sway;
          rearLegUpperDeg = 12 - sway;
          frontLegLowerDeg = -10;
          rearLegLowerDeg = -16;
        }
        setLimb(legFrontUpper, legFrontLower, frontLegUpperDeg, frontLegLowerDeg);
        setLimb(legRearUpper, legRearLower, rearLegUpperDeg, rearLegLowerDeg);

        if (footFront) {
          footFront.style.transform = `translateX(-50%) rotate(${walk * 4}deg)`;
        }
        if (footRear) {
          footRear.style.transform = `translateX(-50%) rotate(${walkOpp * 4}deg)`;
        }

        let frontArmUpperDeg = -6 + walkOpp * 10;
        let rearArmUpperDeg = -6 + walk * 10;
        let frontElbow = 7;
        let rearElbow = 7;

        if (isAtFire) {
          // Hands toward the fire.
          frontArmUpperDeg = 22 + Math.sin(human.phase * 2.4) * 5;
          rearArmUpperDeg = 16 + Math.sin(human.phase * 2.4 + 1.4) * 4;
          frontElbow = 34;
          rearElbow = 28;
        } else if (isAtCamp) {
          // Relaxed arms with a subtle "look around" vibe.
          frontArmUpperDeg = -10 + Math.sin(human.phase * 1.2) * 6;
          rearArmUpperDeg = -18 + Math.cos(human.phase * 1.1) * 5;
          frontElbow = 12;
          rearElbow = 10;
        }

        setLimb(armFrontUpper, armFrontLower, frontArmUpperDeg, frontElbow);
        setLimb(armRearUpper, armRearLower, rearArmUpperDeg, rearElbow);

        if (handFront) {
          handFront.style.transform = `translateX(-50%) rotate(${walkOpp * 4}deg)`;
        }
        if (handRear) {
          handRear.style.transform = `translateX(-50%) rotate(${walk * 4}deg)`;
        }

        window.requestAnimationFrame(animateWalker);
      }

      window.requestAnimationFrame(animateWalker);
    }

    function updateParallax(event) {
      const { innerWidth, innerHeight } = window;
      const x = (event.clientX / innerWidth - 0.5) * 2;
      const y = (event.clientY / innerHeight - 0.5) * 2;

      parallaxLayers.forEach((layer) => {
        const mx = parseFloat(layer.style.getPropertyValue("--mx")) || 0;
        const my = parseFloat(layer.style.getPropertyValue("--my")) || 0;
        layer.style.transform = `translate3d(${x * mx * 7}px, ${y * my * 7}px, 0)`;
      });
    }

    window.addEventListener("pointermove", updateParallax);

    // Moon hide/reveal cycle:
    // clouds thicken + scene darkens, then after 10s moon slowly comes back.
    if (scene) {
      const moonHiddenMs = 10000;
      const moonVisibleMs = 15000;
      const firstHideDelayMs = 7000;

      function beginMoonCoverCycle() {
        scene.classList.add("moon-covered");
        window.setTimeout(() => {
          scene.classList.remove("moon-covered");
          window.setTimeout(beginMoonCoverCycle, moonVisibleMs);
        }, moonHiddenMs);
      }

      window.setTimeout(beginMoonCoverCycle, firstHideDelayMs);
    }

    function launchShootingStar() {
      const startX = 68 + Math.random() * 22;
      const startY = 8 + Math.random() * 16;
      shootingStar.style.left = `${startX}%`;
      shootingStar.style.top = `${startY}%`;
      shootingStar.style.animation = "none";
      void shootingStar.offsetWidth;
      shootingStar.style.animation = "shoot 1.6s ease-out forwards";
    }

    setInterval(() => {
      if (Math.random() > 0.35) {
        launchShootingStar();
      }
    }, 8500);

    // Gentle idle motion on touch devices where pointermove is limited.
    let idleT = 0;
    setInterval(() => {
      idleT += 0.04;
      if (window.matchMedia("(pointer: coarse)").matches) {
        const fakeX = window.innerWidth * (0.5 + Math.sin(idleT) * 0.15);
        const fakeY = window.innerHeight * (0.5 + Math.cos(idleT * 0.7) * 0.12);
        updateParallax({ clientX: fakeX, clientY: fakeY });
      }
    }, 50);
  </script>
</body>
</html>
